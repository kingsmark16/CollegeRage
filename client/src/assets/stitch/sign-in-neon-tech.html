<style>
        .neon-input {
            background-color: transparent;
            border: 1px solid var(--tw-colors-surface-border);
            color: var(--tw-colors-on-surface);
            transition: all 0.2s ease;
        }
        .neon-input:focus {
            border-color: var(--tw-colors-primary-container);
            box-shadow: 0 0 0 1px var(--tw-colors-primary-container);
            outline: none;
        }
        .side-panel-bg {
            background: radial-gradient(circle at center, rgba(52, 213, 154, 0.05) 0%, rgba(0,0,0,0) 70%), 
                        url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Ccircle cx="2" cy="2" r="1" fill="%2334d59a" fill-opacity="0.1" /%3E%3C/svg%3E');
        }

<body class="antialiased min-h-screen font-body-md text-on-surface bg-background flex flex-col">
<!-- Left Panel (High-tech graphic) -->

<!-- Main Content Container -->
<div class="flex-1 min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop bg-background">
<!-- Login Card -->
<div class="w-full max-w-md p-8 md:p-12 flex flex-col">
<!-- Mobile Logo -->
<div class="mb-8 w-12 h-12 md:hidden">
<svg class="w-full h-full text-primary-container" fill="none" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
<path d="M10 30V10H30V20H20V30H10Z" stroke="currentColor" stroke-linejoin="round" stroke-width="4"></path>
</svg>
</div>
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg mb-2 text-on-surface">Welcome back</h1>
<p class="font-body-sm text-body-sm text-text-muted">Please sign in to your account</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<div>
<label class="block font-body-sm text-body-sm text-on-surface mb-2" for="email">Email</label>
<div class="relative">
<input class="neon-input w-full rounded-lg py-3 px-4 font-body-sm text-body-sm placeholder:text-text-muted" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-body-sm text-body-sm text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary-container hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="neon-input w-full rounded-lg py-3 px-4 font-body-sm text-body-sm placeholder:text-text-muted" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<button class="w-full bg-surface-container-high border border-surface-border hover:border-primary-container text-on-surface hover:text-primary-container font-body-sm text-body-sm py-3 rounded-lg transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-text-muted">
                    Don't have an account? 
                    <a class="text-primary-container hover:text-primary-fixed transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</div>

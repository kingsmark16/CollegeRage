services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env
    expose:
      - "3000"
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
